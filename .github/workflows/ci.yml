name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Run ShellCheck
        run: shellcheck -x manage.sh lib/*.sh tests/*.sh

      - name: Run syntax checks
        run: bash -n manage.sh lib/*.sh tests/*.sh

      - name: Run smoke tests
        run: bash tests/smoke.sh
