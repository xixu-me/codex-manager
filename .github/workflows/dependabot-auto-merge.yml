name: Dependabot Auto Merge

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge successful Dependabot PRs
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];

            if (!pr) {
              core.info('No pull request was attached to this workflow run.');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });

            if (pullRequest.user.login !== 'dependabot[bot]') {
              core.info(`Pull request #${pullRequest.number} is not a Dependabot PR.`);
              return;
            }

            if (pullRequest.draft || pullRequest.state !== 'open') {
              core.info(`Pull request #${pullRequest.number} is not ready to merge.`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pullRequest.number,
              merge_method: 'squash',
              sha: context.payload.workflow_run.head_sha,
            });
